@if (showModal && selectedProduct) {
    <div class="modal-overlay" (click)="showModal = false">
      <div class="modal-content-box shadow" (click)="$event.stopPropagation()">
        <div class="card border-0">
          <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center p-3">
            <h5 class="mb-0">Product Details</h5>
            <button type="button" class="btn-close btn-close-white" (click)="showModal = false"></button>
          </div>
          
          <div class="card-body p-4">
            <div class="row">
              <div class="col-6">
                <div class="detail-label">Product ID</div>
                <div class="detail-value">{{ selectedProduct.id }}</div>
              </div>
              <div class="col-6">
                <div class="detail-label">Status</div>
                <div class="detail-value">{{ selectedProduct.status }}</div>
              </div>
              <div class="col-12">
                <div class="detail-label">Product Name</div>
                <div class="detail-value text-primary fw-bold">{{ selectedProduct.name }}</div>
              </div>
              <div class="col-6">
                <div class="detail-label">Category</div>
                <div class="detail-value">{{ selectedProduct.category }}</div>
              </div>
              <div class="col-6">
                <div class="detail-label">Price</div>
                <div class="detail-value text-success">{{ selectedProduct.price | currency }}</div>
              </div>
              <div class="col-12">
                <div class="detail-label">Description</div>
                <div class="p-3 bg-light rounded mt-1">{{ selectedProduct.description }}</div>
              </div>
            </div>
            
            <div class="text-end mt-4">
              <button class="btn btn-secondary px-4" (click)="showModal = false">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  }
