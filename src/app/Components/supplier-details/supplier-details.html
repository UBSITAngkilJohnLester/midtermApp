<h2>Supplier Details</h2>

@if (supplier) {
  <div class="container mt-3">

    <div class="mb-3">
      <label class="form-label">ID</label>
      <input class="form-control" [(ngModel)]="supplier.id" name="id" readonly />
    </div>

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" [(ngModel)]="supplier.name" name="name" />
    </div>

    <div class="mb-3">
      <label class="form-label">Supplier Name</label>
      <input class="form-control" [(ngModel)]="supplier.supplierName" name="supplierName" />
    </div>

    <div class="mb-3">
      <label class="form-label">Contact Person</label>
      <input class="form-control" [(ngModel)]="supplier.contactPerson" name="contactPerson" />
    </div>

    <div class="mb-3">
      <label class="form-label">Category</label>
      <input class="form-control" [(ngModel)]="supplier.category" name="category" />
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input class="form-control" type="number" [(ngModel)]="supplier.price" name="price" />
    </div>

    <div class="mb-3">
      <label class="form-label">Stock</label>
      <input class="form-control" type="number" [(ngModel)]="supplier.stock" name="stock" />
    </div>

    <div class="mb-3">
      <label class="form-label">Status</label>
      <input class="form-control" [(ngModel)]="supplier.status" name="status" />
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" [(ngModel)]="supplier.description" name="description" rows="3"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" (click)="saveChanges()">Save</button>
      <button class="btn btn-secondary" (click)="goBack()">Back</button>
    </div>

  </div>
}
